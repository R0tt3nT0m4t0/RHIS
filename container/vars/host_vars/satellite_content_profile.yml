---
# satellite_content_profile.yml — persistent Satellite content/provisioning profile
#
# This file is intentionally separate from generated host_vars/satellite.yml so
# run_rhis_install_sequence.sh does not overwrite it. It is loaded through the
# playbook vars_dir include flow when /rhis/vars/host_vars is mounted.
#
# Authentication model:
#   Satellite/Foreman/Hammer username is fixed to "admin"
#   Password comes from env.yml via sat_admin_pass / global_admin_password
#
# Notes:
# - DNS/DHCP/TFTP/Libvirt provisioning features are already enabled by the
#   Satellite installer command in rhis_install.sh.
# - This file focuses on post-install content organization: lifecycle envs,
#   content views, activation keys, and a declarative repo model for RHEL 9/10.

satellite_username: "admin"
satellite_password: "{{ sat_admin_pass | default(global_admin_password) | default('') }}"
foreman_username: "admin"
foreman_password: "{{ sat_admin_pass | default(global_admin_password) | default('') }}"
hammer_username: "admin"
hammer_password: "{{ sat_admin_pass | default(global_admin_password) | default('') }}"

satellite_organization: "{{ satellite_organization | default('REDHAT') }}"
satellite_location: "{{ satellite_location | default('CORE') }}"

# Requested lifecycle environments
lifecycle_environments:
  - name: "DEV_RHEL_10_x86_64"
    organization: "{{ satellite_organization }}"
    prior: "Library"
  - name: "TEST_RHEL_10_x86_64"
    organization: "{{ satellite_organization }}"
    prior: "DEV_RHEL_10_x86_64"
  - name: "PROD_RHEL_10_x86_64"
    organization: "{{ satellite_organization }}"
    prior: "TEST_RHEL_10_x86_64"
  - name: "DEV_RHEL_9_x86_64"
    organization: "{{ satellite_organization }}"
    prior: "Library"
  - name: "TEST_RHEL_9_x86_64"
    organization: "{{ satellite_organization }}"
    prior: "DEV_RHEL_9_x86_64"
  - name: "PROD_RHEL_9_x86_64"
    organization: "{{ satellite_organization }}"
    prior: "TEST_RHEL_9_x86_64"

# Requested Content Views
content_views:
  - name: "rhel-10-for-x86_64"
    organization: "{{ satellite_organization }}"
    repositories:
      - name: "rhel-10-for-x86_64-baseos-rpms"
      - name: "rhel-10-for-x86_64-appstream-rpms"
  - name: "rhel-9-for-x86_64"
    organization: "{{ satellite_organization }}"
    repositories:
      - name: "rhel-9-for-x86_64-baseos-rpms"
      - name: "rhel-9-for-x86_64-appstream-rpms"

# Requested activation keys
activation_keys:
  - name: "DEV_RHEL_10_x86_64"
    organization: "{{ satellite_organization }}"
    lifecycle_environment: "DEV_RHEL_10_x86_64"
    content_view: "rhel-10-for-x86_64"
  - name: "TEST_RHEL_10_x86_64"
    organization: "{{ satellite_organization }}"
    lifecycle_environment: "TEST_RHEL_10_x86_64"
    content_view: "rhel-10-for-x86_64"
  - name: "PROD_RHEL_10_x86_64"
    organization: "{{ satellite_organization }}"
    lifecycle_environment: "PROD_RHEL_10_x86_64"
    content_view: "rhel-10-for-x86_64"
  - name: "DEV_RHEL_9_x86_64"
    organization: "{{ satellite_organization }}"
    lifecycle_environment: "DEV_RHEL_9_x86_64"
    content_view: "rhel-9-for-x86_64"
  - name: "TEST_RHEL_9_x86_64"
    organization: "{{ satellite_organization }}"
    lifecycle_environment: "TEST_RHEL_9_x86_64"
    content_view: "rhel-9-for-x86_64"
  - name: "PROD_RHEL_9_x86_64"
    organization: "{{ satellite_organization }}"
    lifecycle_environment: "PROD_RHEL_9_x86_64"
    content_view: "rhel-9-for-x86_64"

# Declarative repository intent for RHEL 9/10 content views.
# These IDs align with the repository labels you requested.
satellite_desired_rhel_content:
  rhel_10_x86_64:
    content_view: "rhel-10-for-x86_64"
    repositories:
      - "rhel-10-for-x86_64-baseos-rpms"
      - "rhel-10-for-x86_64-appstream-rpms"
  rhel_9_x86_64:
    content_view: "rhel-9-for-x86_64"
    repositories:
      - "rhel-9-for-x86_64-baseos-rpms"
      - "rhel-9-for-x86_64-appstream-rpms"

# Provisioning intent notes: these are already enabled in the Satellite install
# command generated by rhis_install.sh:
# - DHCP
# - DNS
# - TFTP
# - Libvirt compute integration
# - Kickstart/image-based provisioning support through Satellite media/compute roles
