---
# Consolidated Ansible requirements for all RHIS container roles
# This file includes all collections needed by satellite, idm, and aap builders
#
# Usage: ansible-galaxy collection install -r requirements.yml

collections:
  # Core Ansible collections
  - name: "ansible.posix"
    version: "*"
  - name: "ansible.utils"
    version: "*"
  - name: "ansible.netcommon"
    version: "*"
  - name: "ansible.controller"
    version: "4.5.21"
  - name: "ansible.hub"
    version: "*"

  # Community collections
  - name: "community.general"
    version: "*"
  - name: "community.vmware"
    version: "*"
  - name: "community.aws"
    version: "*"

  # RedHat/Infrastructure collections
  - name: "redhat.rhel_idm"
    version: ">=1.14.7"           # Earlier versions fail with 'dns_over_tls' option error
  - name: "redhat.rhel_system_roles"
    version: "*"
  - name: "redhat.satellite"
    version: "*"
  - name: "redhat.satellite_operations"
    version: "*"
  - name: "redhat.redhat_csp_download"
    version: "*"

  # Cloud and container collections
  - name: "azure.azcollection"
    version: "*"
  - name: "containers.podman"
    version: "*"
  - name: "vmware.vmware"
    version: "*"

# Optional: You can also specify roles if needed, though the roles
# are typically included as part of the role imports in playbooks
# roles:
#   - src: https://github.com/...
#     name: role_name
#     version: main
